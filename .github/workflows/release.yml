name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  enforce-beta-first:
    name: Enforce beta-before-final
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, '-') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Verify beta tag exists for this version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_BASE="${VERSION#v}"
          if ! git tag -l "v${VERSION_BASE}-*" | grep -q .; then
            echo "ERROR: No beta tag found for ${VERSION}."
            echo "A beta tag (e.g. v${VERSION_BASE}-beta) must be pushed and verified before tagging a final release."
            exit 1
          fi
          echo "Beta tag found for ${VERSION}:"
          git tag -l "v${VERSION_BASE}-*"

  build-and-test:
    name: Build & Test
    needs: [enforce-beta-first]
    if: ${{ always() && (needs.enforce-beta-first.result == 'success' || needs.enforce-beta-first.result == 'skipped') }}
    uses: ./.github/workflows/_build-test.yml
    with:
      test-filter: 'TestCategory!=Live'

  build-and-push:
    name: Build & Push Docker Image
    needs: [enforce-beta-first, build-and-test]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image is pullable (amd64 + arm64)
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}" | tr '[:upper:]' '[:lower:]')
          docker pull --platform linux/amd64 "$IMAGE"
          docker pull --platform linux/arm64 "$IMAGE"

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Quotinator ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md \
            --verify-tag \
            ${{ contains(github.ref, '-') && '--prerelease' || '' }}
