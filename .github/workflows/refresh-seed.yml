name: Refresh seed data

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Check upstream sources & re-seed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Download upstream sources
        run: |
          curl -sf https://raw.githubusercontent.com/vilaboim/movie-quotes/master/movie-quotes.json \
               -o /tmp/vilaboim-new.json
          curl -sf https://raw.githubusercontent.com/NikhilNamal17/popular-movie-quotes/master/data/data.json \
               -o /tmp/nikhil-new.json

      - name: Detect changes
        id: changes
        run: |
          changed=false
          if ! diff -q scripts/sources/vilaboim.json /tmp/vilaboim-new.json > /dev/null 2>&1; then
            echo "vilaboim source changed"
            cp /tmp/vilaboim-new.json scripts/sources/vilaboim.json
            changed=true
          fi
          if ! diff -q scripts/sources/nikhil.json /tmp/nikhil-new.json > /dev/null 2>&1; then
            echo "nikhil source changed"
            cp /tmp/nikhil-new.json scripts/sources/nikhil.json
            changed=true
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.x'

      - name: Install dotnet-script
        if: steps.changes.outputs.changed == 'true'
        run: dotnet tool install -g dotnet-script

      - name: Re-seed quotes.json
        if: steps.changes.outputs.changed == 'true'
        run: dotnet-script scripts/seed.csx scripts/

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: seed/upstream-update
          delete-branch: true
          title: 'chore: refresh seed data from upstream sources'
          body: |
            One or more upstream source repositories have changed.

            This PR updates `scripts/sources/` with the latest data and re-generates `data/quotes.json`.

            **Before merging:** review the diff in `data/quotes.json` for unexpected removals or schema changes.

            Sources:
            - [vilaboim/movie-quotes](https://github.com/vilaboim/movie-quotes)
            - [NikhilNamal17/popular-movie-quotes](https://github.com/NikhilNamal17/popular-movie-quotes)
          commit-message: 'chore: refresh seed data from upstream sources'
          labels: data
