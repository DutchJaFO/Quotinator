configuration:
  log_level:
    name: Log level
    description: >-
      Controls log verbosity. Use debug when reporting issues.
      Valid values: trace, debug, info, notice, warning, error, fatal.
  log_requests:
    name: Log requests
    description: >-
      Log each incoming request to the quote API endpoints.
      Disabled by default — enable to confirm calls are arriving without needing debug log level.
  ssl:
    name: SSL / HTTPS
    description: >-
      Enable HTTPS on the direct access port (8080). Requires a certificate and key file.
      Not needed when using HA ingress or a reverse proxy for TLS termination.
  certfile:
    name: Certificate file
    description: >-
      Certificate filename, relative to /ssl/.
      The Let's Encrypt add-on writes fullchain.pem automatically.
  keyfile:
    name: Key file
    description: >-
      Private key filename, relative to /ssl/.
      The Let's Encrypt add-on writes privkey.pem automatically.
  admin_api_key:
    name: Admin API key
    description: >-
      Secret key required to call the destructive admin endpoints (reseed, reset).
      Clients must supply X-Api-Key: <key>.
      Leave empty to disable the admin endpoints entirely.
  backup_path:
    name: Backup folder
    description: >-
      Directory where pre-migration database backups are stored.
      Leave empty to use the default: a backups/ subfolder inside the data directory.
  auto_update_sources:
    name: Auto-update sources
    description: >-
      Check manifest entries that declare a download URL for a fresher copy before seeding.
      Disable for fully offline/air-gapped installs — no network calls are ever made when off.
  source_update_interval_hours:
    name: Source update interval (hours)
    description: >-
      How long a downloaded source file is considered fresh before it is checked again.
      Individual sources may override this in their own manifest entry.
network:
  8080/tcp: Direct web access — HTTP (ssl disabled) or HTTPS (ssl enabled)
