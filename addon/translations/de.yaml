configuration:
  log_level:
    name: Protokollstufe
    description: >-
      Steuert die Ausführlichkeit der Protokollierung. Verwende debug bei der Meldung von Problemen.
      Gültige Werte: trace, debug, info, notice, warning, error, fatal.
  log_requests:
    name: Anfragen protokollieren
    description: >-
      Protokolliert jede eingehende Anfrage an die Quote-API-Endpunkte.
      Standardmäßig deaktiviert — aktivieren, um eingehende Anfragen ohne Debug-Protokollstufe zu bestätigen.
  ssl:
    name: SSL / HTTPS
    description: >-
      Aktiviert HTTPS auf dem Direktzugriffsport (8080). Erfordert ein Zertifikat und eine Schlüsseldatei.
      Nicht erforderlich bei Verwendung von HA Ingress oder einem Reverse-Proxy für TLS-Terminierung.
  certfile:
    name: Zertifikatsdatei
    description: >-
      Dateiname des Zertifikats, relativ zu /ssl/.
      Das Let's Encrypt Add-on schreibt fullchain.pem automatisch.
  keyfile:
    name: Schlüsseldatei
    description: >-
      Dateiname des privaten Schlüssels, relativ zu /ssl/.
      Das Let's Encrypt Add-on schreibt privkey.pem automatisch.
  admin_api_key:
    name: Admin-API-Schlüssel
    description: >-
      Geheimer Schlüssel, der zum Aufrufen der destruktiven Admin-Endpunkte (Reseed, Reset) erforderlich ist.
      Clients müssen X-Api-Key: <Schlüssel> senden.
      Leer lassen, um die Admin-Endpunkte vollständig zu deaktivieren.
  backup_path:
    name: Sicherungsordner
    description: >-
      Verzeichnis, in dem Datenbanksicherungen vor Migrationen gespeichert werden.
      Leer lassen für den Standardwert: ein backups/-Unterordner im Datenverzeichnis.
  auto_update_sources:
    name: Quellen automatisch aktualisieren
    description: >-
      Prüft Manifest-Einträge mit einer Download-URL vor dem Seeding auf eine neuere Version.
      Deaktivieren für vollständig Offline-/Air-Gapped-Installationen — es werden dann nie Netzwerkanfragen gestellt.
  source_update_interval_hours:
    name: Aktualisierungsintervall Quellen (Stunden)
    description: >-
      Wie lange eine heruntergeladene Quelldatei als aktuell gilt, bevor sie erneut geprüft wird.
      Einzelne Quellen können dies in ihrem eigenen Manifest-Eintrag überschreiben.
network:
  8080/tcp: Direkter Webzugriff — HTTP (SSL deaktiviert) oder HTTPS (SSL aktiviert)
